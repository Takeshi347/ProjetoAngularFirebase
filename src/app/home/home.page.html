<ion-content [fullscreen]>

    <table>
        <tr>
            <th>ISBN</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>
                Ações 
            </th>
        </tr>

        <ng-container *ngFor="let livro of this.livros">
            <tr>
                <td>{{ livro.isbn }}</td>
                <td>{{ livro.titulo }}</td>
                <td>
                    <ion-card>
                        <ng-container *ngFor="let cat of livro.categoria">
                            <ion-row>
                                <ion-col size="12">
                                    <ion-label>{{ cat.nome }}</ion-label>
                                </ion-col>
                            </ion-row>
                        </ng-container>
                    </ion-card>
                </td>
                <td>
                    <ion-button>
                    <ion-icon name="create-outline"></ion-icon>
                </ion-button>
                <ion-button>
                    <ion-icon name="trash-outline"></ion-icon>
                </ion-button>
                </td>
            </tr>
        </ng-container>
    </table>
</ion-content>
