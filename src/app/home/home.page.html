    <ion-menu contentId="main-content">
        <ion-header>
            <ion-toolbar>

        <ion-content class="ion-padding">
            <ion-row>
                <ion-col size="3">
                    <ion-avatar>

                <ion-col size="9">
                    <ion-item>
