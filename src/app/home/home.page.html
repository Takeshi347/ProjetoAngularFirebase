<ion-content [fullscreen]="true">

    <ion-row class="ion-justify-content-center">
        <ion-col size="4">
            <ion-card>
                <ion-card-header>
                    <ion-card-title>Cadastro de Veículos</ion-card-title>
                </ion-card-header>
                <ion-card-content>
                    {{ this.veiculo.modelo }}
                    <ion-input [(ngModel)]="this.veiculo.modelo" label="Modelo" labelPlacement="stacked"></ion-input>
                    <ion-input [(ngModel)]="this.veiculo.marca" label="Marca" labelPlacement="stacked"></ion-input>
                    <ion-input [(ngModel)]="this.veiculo.cor" label="Cor" labelPlacement="stacked"></ion-input>
                    <ion-button color="secondary" fill="outline" (click)="adicionar()">Adicionar</ion-button>
                </ion-card-content>
            </ion-card>
        </ion-col>
        <ion-col size="4">
            <ion-card>
                <ion-card-header>
                    <ion-card-title>Lista de Veículos</ion-card-title>
                </ion-card-header>
                <ion-card-content>
                    <ng-container *ngFor="let veiculo of this.veiculos">
                        <ion-item>{{ veiculo.modelo }}</ion-item>
                        <ion-item>{{ veiculo.marca }}</ion-item>
                        <ion-item>{{ veiculo.cor }}</ion-item>
                    </ng-container>
                </ion-card-content>
            </ion-card>
        </ion-col>
    </ion-row>
    
    
</ion-content>
